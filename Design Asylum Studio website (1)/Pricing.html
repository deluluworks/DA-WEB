<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pricing</title>
<meta name="description" content="Budget ranges for B2B branding, websites and motion — INR, USD and timelines. Design Asylum." />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="stylesheet" href="_ds/design-asylum-studio-v3-5943145e-1a4f-4091-8df6-de00e686edbf/styles.css" />
<script src="_ds/design-asylum-studio-v3-5943145e-1a4f-4091-8df6-de00e686edbf/_ds_bundle.js"></script>
<style>
  /* Blinker = Regular 400 only (design-system rule): remap heavier Blinker
     faces to the 400 master so any weight (incl. DS bundle) renders Regular. */
  @font-face { font-family:'Blinker'; font-style:normal; font-weight:500; font-display:swap; src:url('https://cdn.jsdelivr.net/npm/@fontsource/blinker/files/blinker-latin-400-normal.woff2') format('woff2'); }
  @font-face { font-family:'Blinker'; font-style:normal; font-weight:600; font-display:swap; src:url('https://cdn.jsdelivr.net/npm/@fontsource/blinker/files/blinker-latin-400-normal.woff2') format('woff2'); }
  @font-face { font-family:'Blinker'; font-style:normal; font-weight:700; font-display:swap; src:url('https://cdn.jsdelivr.net/npm/@fontsource/blinker/files/blinker-latin-400-normal.woff2') format('woff2'); }
  @font-face { font-family:'Blinker'; font-style:normal; font-weight:800; font-display:swap; src:url('https://cdn.jsdelivr.net/npm/@fontsource/blinker/files/blinker-latin-400-normal.woff2') format('woff2'); }
  @font-face { font-family:'Blinker'; font-style:normal; font-weight:900; font-display:swap; src:url('https://cdn.jsdelivr.net/npm/@fontsource/blinker/files/blinker-latin-400-normal.woff2') format('woff2'); }

  :root {
    --da-gutter: 40px;
    --page-max-width: 1500px;
    --gutter: clamp(16px, 3vw, 40px);
    --radius-cards: 0px;
    --radius-body-blocks: 0px;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    min-width: 1180px;
    background: var(--color-paper-white);
    color: var(--color-obsidian-ink);
    -webkit-font-smoothing: antialiased;
    font-synthesis: none;
  }
  ::selection { background: var(--color-solar-bloom); color: var(--color-obsidian-ink); }
  #root *, #root *::before, #root *::after { font-style: normal !important; }

  .da-wrap { max-width: var(--page-max-width); margin: 0 auto; padding-left: var(--da-gutter); padding-right: var(--da-gutter); }
  #root h2 { font-weight: 400; }

  /* breadcrumb (shared class names) */
  .sl-crumb { display: inline-flex; align-items: center; gap: 10px; font-family: var(--font-display); font-weight: 400; text-transform: uppercase; letter-spacing: 0.1em; font-size: 11px; }
  .sl-crumb a { text-decoration: none; }
  .sl-crumb-sep { font-size: 13px; }
  .da-mail { text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
  .da-mail .da-mail-arrow { display: inline-block; transition: transform .2s ease; }
  .da-mail:hover .da-mail-arrow { transform: translate(3px, -3px); }

  /* reveal */
  .sl-reveal { opacity: 0; transform: translateY(26px); transition: opacity .7s cubic-bezier(.22,.61,.36,1), transform .7s cubic-bezier(.22,.61,.36,1); }
  .sl-reveal.is-in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) { .sl-reveal { opacity: 1; transform: none; transition: none; } }

  /* ============ PRICING (utility table page) ============ */
  .pr-wrap { max-width: 1000px; margin: 0 auto; }

  .pr-h1 {
    margin: 0;
    font-family: var(--font-display); font-weight: 400;
    text-transform: none; letter-spacing: -0.025em; line-height: 1.0;
    font-size: clamp(58px, 7.4vw, 124px);
    color: var(--color-obsidian-ink);
  }

  .pr-intro {
    margin: 0; max-width: 800px;
    font-family: var(--font-serif);
    font-size: clamp(19px, 1.55vw, 23px); line-height: 1.62;
    color: var(--color-graphite);
  }

  /* the focal element: 4-column matrix, squared corners, crisp framing */
  .pr-tablewrap {
    margin-top: clamp(48px, 5vw, 76px);
    border: 1px solid var(--color-obsidian-ink);
    overflow-x: auto;
  }
  .pr-table { width: 100%; min-width: 720px; border-collapse: collapse; }
  .pr-table thead th {
    text-align: left; padding: 19px 26px;
    background: var(--color-obsidian-ink); color: var(--color-paper-white);
    font-family: var(--font-display); font-weight: 400;
    text-transform: uppercase; letter-spacing: 0.1em; font-size: 12px;
    white-space: nowrap;
  }
  .pr-table tbody td {
    padding: 25px 26px; border-bottom: 1px solid var(--color-fog);
    vertical-align: middle;
  }
  .pr-table tbody tr:last-child td { border-bottom: none; }
  .pr-table tbody tr { transition: background .2s ease; }
  .pr-table tbody tr:hover { background: var(--color-paper-off); }

  .pr-svc {
    display: inline-flex; align-items: center; gap: 12px;
    font-family: var(--font-display); font-weight: 400;
    font-size: clamp(17px, 1.35vw, 20px); letter-spacing: -0.005em;
    color: var(--color-obsidian-ink); text-wrap: balance;
  }
  .pr-svc-arrow {
    flex: 0 0 auto; color: var(--color-iris-voltage);
    opacity: 0; transform: translateX(-7px);
    transition: opacity .2s ease, transform .2s ease;
  }
  .pr-table tbody tr:hover .pr-svc-arrow { opacity: 1; transform: none; }

  .pr-inr {
    font-family: var(--font-display); font-weight: 400;
    font-size: clamp(16px, 1.3vw, 19px); color: var(--color-obsidian-ink);
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  .pr-usd {
    font-family: var(--font-display); font-weight: 400;
    font-size: clamp(15px, 1.2vw, 18px); color: var(--color-graphite);
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  .pr-time {
    font-family: var(--font-display); font-weight: 400;
    text-transform: uppercase; letter-spacing: 0.04em; font-size: 12px;
    color: var(--color-ash); white-space: nowrap;
  }

  .pr-footnote {
    margin: 34px 0 0; max-width: 840px;
    font-family: var(--font-serif); font-size: 16px; line-height: 1.6;
    color: var(--color-ash);
  }

  .pr-promise-band {
    margin-top: clamp(72px, 7vw, 112px);
    border-top: 1px solid var(--color-fog);
    padding-top: clamp(48px, 5vw, 76px);
  }
  .pr-promise {
    margin: 0; max-width: 24ch;
    font-family: var(--font-display); font-weight: 400;
    letter-spacing: -0.02em; line-height: 1.12;
    font-size: clamp(30px, 3.6vw, 56px);
    color: var(--color-obsidian-ink); text-wrap: balance;
  }

  @media (min-width: 1728px) { :root { --page-max-width: 1680px; --da-gutter: 56px; } .pr-wrap { max-width: 1100px; } }
  @media (min-width: 2240px) { :root { --page-max-width: 2080px; --da-gutter: 80px; } .pr-wrap { max-width: 1240px; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react" src="sevenloop/sl-shared.jsx"></script>
<script type="text/babel" data-presets="react" src="pricing/pricing.jsx"></script>
</body>
</html>
