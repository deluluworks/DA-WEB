<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Design Asylum Team</title>
<meta name="description" content="The people behind Design Asylum — leadership and team. Strategists, designers, writers, developers and motion artists." />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="stylesheet" href="_ds/design-asylum-studio-v3-5943145e-1a4f-4091-8df6-de00e686edbf/styles.css" />
<script src="_ds/design-asylum-studio-v3-5943145e-1a4f-4091-8df6-de00e686edbf/_ds_bundle.js"></script>
<style>
  /* Blinker = Regular 400 only (design-system rule): remap heavier Blinker
     faces to the 400 master so any weight (incl. DS bundle) renders Regular. */
  @font-face { font-family:'Blinker'; font-style:normal; font-weight:500; font-display:swap; src:url('https://cdn.jsdelivr.net/npm/@fontsource/blinker/files/blinker-latin-400-normal.woff2') format('woff2'); }
  @font-face { font-family:'Blinker'; font-style:normal; font-weight:600; font-display:swap; src:url('https://cdn.jsdelivr.net/npm/@fontsource/blinker/files/blinker-latin-400-normal.woff2') format('woff2'); }
  @font-face { font-family:'Blinker'; font-style:normal; font-weight:700; font-display:swap; src:url('https://cdn.jsdelivr.net/npm/@fontsource/blinker/files/blinker-latin-400-normal.woff2') format('woff2'); }
  @font-face { font-family:'Blinker'; font-style:normal; font-weight:800; font-display:swap; src:url('https://cdn.jsdelivr.net/npm/@fontsource/blinker/files/blinker-latin-400-normal.woff2') format('woff2'); }
  @font-face { font-family:'Blinker'; font-style:normal; font-weight:900; font-display:swap; src:url('https://cdn.jsdelivr.net/npm/@fontsource/blinker/files/blinker-latin-400-normal.woff2') format('woff2'); }

  :root {
    --da-gutter: 40px;
    --page-max-width: 1500px;
    --gutter: clamp(16px, 3vw, 40px);
    --radius-cards: 0px;
    --radius-body-blocks: 0px;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    min-width: 1180px;
    background: var(--color-paper-white);
    color: var(--color-obsidian-ink);
    -webkit-font-smoothing: antialiased;
    font-synthesis: none;
  }
  ::selection { background: var(--color-solar-bloom); color: var(--color-obsidian-ink); }
  #root *, #root *::before, #root *::after { font-style: normal !important; }

  .da-wrap { max-width: var(--page-max-width); margin: 0 auto; padding-left: var(--da-gutter); padding-right: var(--da-gutter); }
  #root h2 { font-weight: 400; }

  .da-mail { text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
  .da-mail .da-mail-arrow { display: inline-block; transition: transform .2s ease; }
  .da-mail:hover .da-mail-arrow { transform: translate(3px, -3px); }
  .sl-crumb { display: inline-flex; align-items: center; gap: 10px; font-family: var(--font-display); font-weight: 400; text-transform: uppercase; letter-spacing: 0.1em; font-size: 11px; }
  .sl-crumb a { text-decoration: none; }
  .sl-crumb-sep { font-size: 13px; }

  /* reveal */
  .sl-reveal { opacity: 0; transform: translateY(26px); transition: opacity .7s cubic-bezier(.22,.61,.36,1), transform .7s cubic-bezier(.22,.61,.36,1); }
  .sl-reveal.is-in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) { .sl-reveal { opacity: 1; transform: none; transition: none; } }

  /* ============ TEAM (two-tier roster) ============ */
  .tm-h1 {
    margin: 0;
    font-family: var(--font-display); font-weight: 400;
    text-transform: none; letter-spacing: -0.028em; line-height: 0.98;
    font-size: clamp(56px, 7vw, 120px);
    color: var(--color-obsidian-ink);
  }
  .tm-intro {
    margin: 28px 0 0; max-width: 620px;
    font-family: var(--font-serif);
    font-size: clamp(18px, 1.5vw, 22px); line-height: 1.55;
    color: var(--color-graphite);
  }

  .tm-head {
    display: flex; align-items: baseline; gap: 20px;
    border-bottom: 1px solid var(--color-obsidian-ink);
    padding-bottom: 24px; margin-bottom: 40px;
  }
  .tm-sec-title {
    margin: 0; font-family: var(--font-display); font-weight: 400;
    letter-spacing: -0.02em; line-height: 1.0;
    font-size: var(--text-section); color: var(--color-obsidian-ink);
  }
  .tm-sec-count {
    font-family: var(--font-display); font-weight: 400;
    text-transform: uppercase; letter-spacing: 0.12em; font-size: 11px;
    color: var(--color-ash);
  }

  .tm-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

  .tm-card {
    position: relative; display: flex; flex-direction: column;
    border: 1px solid var(--color-fog); background: var(--color-paper-white);
    text-decoration: none; overflow: hidden;
    transition: transform .25s ease, border-color .25s ease;
  }
  .tm-card:hover { transform: translateY(-4px); border-color: var(--color-obsidian-ink); }

  .tm-vis {
    position: relative; width: 100%; aspect-ratio: 1 / 1; overflow: hidden;
  }
  .tm-vis-glow { position: absolute; inset: 0; transition: transform .55s cubic-bezier(.22,.61,.36,1); }
  .tm-card:hover .tm-vis-glow { transform: scale(1.08); }
  .tm-initials {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    font-family: var(--font-display); font-weight: 400; letter-spacing: -0.02em;
    font-size: clamp(40px, 4vw, 60px); color: rgba(255,255,255,0.16);
    line-height: 1;
  }

  .tm-body { padding: 24px 24px 26px; display: flex; flex-direction: column; flex: 1 1 auto; }
  .tm-role {
    font-family: var(--font-display); font-weight: 400;
    text-transform: uppercase; letter-spacing: 0.08em; font-size: 10px;
    color: var(--color-iris-voltage);
  }
  .tm-name {
    margin: 12px 0 0; font-family: var(--font-display); font-weight: 400;
    letter-spacing: -0.01em; line-height: 1.05;
    font-size: clamp(20px, 1.7vw, 25px); color: var(--color-obsidian-ink);
  }
  .tm-bio {
    margin: 12px 0 0; font-family: var(--font-serif);
    font-size: 15px; line-height: 1.5; color: var(--color-graphite);
    flex: 1 1 auto;
  }
  .tm-more {
    margin-top: 22px; display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-display); font-weight: 400;
    text-transform: uppercase; letter-spacing: 0.08em; font-size: 11px;
    color: var(--color-obsidian-ink);
  }
  .tm-more-arrow { display: inline-block; transition: transform .2s ease; }
  .tm-card:hover .tm-more-arrow { transform: translateX(5px); }

  /* responsive fallbacks (below the 1180 body floor; kept for completeness) */
  @media (max-width: 1100px) { .tm-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 760px) { .tm-grid { grid-template-columns: repeat(2, 1fr); } }

  @media (min-width: 1728px) { :root { --page-max-width: 1680px; --da-gutter: 56px; } }
  @media (min-width: 2240px) { :root { --page-max-width: 2080px; --da-gutter: 80px; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react" src="sevenloop/sl-shared.jsx"></script>
<script type="text/babel" data-presets="react" src="team/team.jsx"></script>
</body>
</html>
