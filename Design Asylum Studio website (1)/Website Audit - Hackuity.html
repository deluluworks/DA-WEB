<head>

<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hackuity.io - Clear Messaging, Augmented By Visual Design</title>
<meta name="description" content="Website audit of Hackuity.io — clear messaging augmented by minimal visual design. Audited by Design Asylum." />

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
  :root { --da-gutter: 40px; --page-max-width: 1500px; --gutter: clamp(16px,3vw,40px); --radius-cards: 0px; }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; min-width: 1180px; background: var(--color-paper-white); color: var(--color-obsidian-ink); -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--color-solar-bloom); color: var(--color-obsidian-ink); }
  #root *, #root *::before, #root *::after { font-style: normal !important; }
  .da-wrap { max-width: var(--page-max-width); margin: 0 auto; padding-left: var(--da-gutter); padding-right: var(--da-gutter); }
  #root h2 { font-weight: 400; }

  .sl-crumb { display: inline-flex; align-items: center; gap: 10px; font-family: var(--font-display); font-weight: 400; text-transform: uppercase; letter-spacing: 0.1em; font-size: 11px; }
  .sl-crumb a { text-decoration: none; }
  .sl-crumb-sep { font-size: 13px; }
  .da-mail { text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }

  /* audit layout */
  .audit-heading-wrap { max-width: 1100px; }
  .audit-content-wrap { display: flex; flex-wrap: wrap; gap: 56px; margin-top: 44px; }
  .audit-meta-k { font-family: var(--font-display); font-weight: 400; text-transform: uppercase; letter-spacing: 0.12em; font-size: 10px; color: var(--color-ash); margin-bottom: 8px; }
  .audit-meta-v { font-family: var(--font-display); font-weight: 400; text-transform: uppercase; letter-spacing: 0.02em; font-size: 16px; color: var(--color-obsidian-ink); }
  .author-wrap { display: inline-flex; align-items: center; gap: 14px; }
  .author-avatar { width: 44px; height: 44px; flex: 0 0 auto; overflow: hidden; position: relative; background: var(--color-deep-teal); }

  /* annotated audit hero image */
  .audit-hero-img { position: relative; width: 100%; overflow: hidden; border: 1px solid var(--color-fog); background: var(--color-paper-off); }
  .audit-shot { position: relative; width: 100%; }
  .audit-shot-row { border-bottom: 1px solid var(--color-fog); position: relative; }
  .audit-pin { position: absolute; display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 999px; background: var(--color-iris-voltage); color: #fff; font-family: var(--font-display); font-weight: 400; font-size: 14px; box-shadow: 0 0 0 6px rgba(81,111,234,0.18); z-index: 2; }
  .audit-note { position: absolute; max-width: 300px; background: var(--color-obsidian-ink); color: var(--color-paper-white); padding: 16px 18px; z-index: 3; }
  .audit-note-k { font-family: var(--font-display); font-weight: 400; text-transform: uppercase; letter-spacing: 0.08em; font-size: 10px; color: var(--color-solar-bloom); margin-bottom: 7px; }
  .audit-note-p { font-family: var(--font-serif); font-size: 14px; line-height: 1.5; margin: 0; color: rgba(255,255,255,0.88); }

  .sl-reveal { opacity: 0; transform: translateY(26px); transition: opacity .7s cubic-bezier(.22,.61,.36,1), transform .7s cubic-bezier(.22,.61,.36,1); }
  .sl-reveal.is-in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) { .sl-reveal { opacity: 1; transform: none; transition: none; } }

  @media (min-width: 1728px) { :root { --page-max-width: 1680px; --da-gutter: 56px; } }
  @media (min-width: 2240px) { :root { --page-max-width: 2080px; --da-gutter: 80px; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react" src="sevenloop/sl-shared.jsx"></script>
<script type="text/babel" data-presets="react" src="audit/audit-app.jsx"></script>
</body>
</html>
